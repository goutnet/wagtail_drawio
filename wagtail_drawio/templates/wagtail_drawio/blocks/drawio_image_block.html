{% load wagtailcore_tags %}
{% spaceless %}
{% if value and value.pk %}
<img
    src="{% url 'wagtail_drawio:drawio_image' value.pk %}"
    alt="{{ value.title }}"
    title="{{ value.title }}"
    width="{{ value.width }}"
    height="{{ value.height }}"
    class="drawio_image"
    />
{% endif %}
{% endspaceless %}
