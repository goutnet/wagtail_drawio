{% load wagtailcore_tags %}
{% spaceless %}
{% if value.diagram and value.diagram.pk %}
<img
    src="{% url 'wagtail_drawio:drawio_image' value.diagram.pk %}"
    alt="{{ value.diagram.title }}"
    title="{{ value.diagram.title }}"
    width="{{ value.diagram.width }}"
    height="{{ value.diagram.height }}"
    class="drawio_image"
    />
{% endif %}
{% endspaceless %}
